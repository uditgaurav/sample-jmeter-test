name: Publish Docker image

# Builds the Dockerfile and pushes the image to Docker Hub.
# Requires two repo secrets:
#   DOCKERHUB_USERNAME  - the Docker Hub account that owns the image repo (uditgaurav)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with write access
on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  IMAGE: uditgaurav/sample-jmeter-test
  VERSION: "1.0.0"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
