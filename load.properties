# Parameters for the load test. Passed to JMeter with: jmeter -q load.properties
# and consumed in the plan via ${__P(NAME,default)} / by the Java code via JMeter variables.

# ---- Target ---------------------------------------------------------------------------------
# By default an in-JVM mock server is started and the test hits it. To load test a REAL service,
# set START_EMBEDDED_SERVER=false and point TARGET_BASE_URL at it (it must expose the same
# /items CRUD contract, or adjust ClientRequests.java accordingly).
START_EMBEDDED_SERVER=true
EMBEDDED_PORT=18150
TARGET_BASE_URL=http://localhost:18150

# ---- Load shape -----------------------------------------------------------------------------
THREAD_NUMBER=10
DURATION_SECONDS=120
RAMP_SECONDS=15
# Pause between iterations per thread (built-in Constant Timer), milliseconds.
THINK_TIME_MS=200

# ---- Scenario selection ---------------------------------------------------------------------
# SCENARIO = All | Crud | Read
SCENARIO=All
# Percentage of iterations routed to each scenario (Throughput Controllers).
CRUD_THROUGHPUT=10
READ_THROUGHPUT=90

# ---- Data + behaviour -----------------------------------------------------------------------
# How many baseline items setUpData() creates.
RESOURCE_COUNT=200
# Share of read requests that deliberately target a non-existent id (expect 404).
PERCENTAGE_404=25
# Delay between chained steps inside the CRUD flow, milliseconds (the "afterDelay" spacing).
STEP_DELAY_MS=500

# ---- Assertion ------------------------------------------------------------------------------
# Per-sample SLA in ms for the Duration Assertion (the JUnitSampler trigger is fast, so this is
# generous; tighten it when pointing at a real service).
SLA=60000
